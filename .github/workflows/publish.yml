name: Build and Publish Conda Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rattler-build
        run: |
          curl -Ls https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Build conda package
        run: |
          rattler-build build --recipe conda.recipe/recipe.yaml \
            --output-dir dist/ \
            --channel https://repo.prefix.dev/ecoscope-workflows/ \
            --channel conda-forge

      - name: Upload to prefix.dev
        run: |
          rattler-build upload prefix \
            --channel ecoscope-workflows-gcf \
            --api-key ${{ secrets.PREFIX_DEV_TOKEN }} \
            dist/noarch/*.conda

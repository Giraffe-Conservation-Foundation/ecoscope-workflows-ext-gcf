name: Build and Publish Conda Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.28
        with:
          rattler-build-version: latest

      - name: Build conda package
        run: |
          rattler-build build --recipe recipe.yaml \
            --output-dir dist/ \
            --channel https://repo.prefix.dev/ecoscope-workflows/ \
            --channel conda-forge

      - name: Upload to prefix.dev
        env:
          PREFIX_DEV_TOKEN: ${{ secrets.PREFIX_DEV_TOKEN }}
        run: |
          rattler-build upload prefix \
            --channel ecoscope-workflows-gcf \
            dist/noarch/*.conda
